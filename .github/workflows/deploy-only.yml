name: Deploy Only (Re-deploy)

# 仅部署，跳过构建。用于镜像已构建成功但部署失败时手动重试。
# GitHub 网页 → Actions → "Deploy Only (Re-deploy)" → Run workflow
on:
  workflow_dispatch:
    inputs:
      target:
        description: '部署目标'
        required: true
        type: choice
        options:
          - ecs
          - ovh
          - both
        default: both
      image_tag:
        description: '镜像 tag(留空=部署所选分支的最新 <branch>-latest;回滚填历史 tag,如 release-v0.2.0-abc1234)'
        required: false
        type: string
        default: ''

env:
  IMAGE_REGISTRY: ghcr.io/matgo-dev/buildreach
  ACR_IMAGE_REGISTRY: crpi-mduxqqlcuiv1a644.cn-hangzhou.personal.cr.aliyuncs.com/buildlink01

jobs:
  resolve-tag:
    name: 解析镜像 Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: 计算镜像 Tag
        id: tag
        env:
          RAW_BRANCH: ${{ github.ref_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            # 手动指定(用于回滚到历史版本),直接用该 tag,不重新构建
            IMAGE_TAG="$INPUT_IMAGE_TAG"
            echo "使用手动指定镜像 Tag(回滚): $IMAGE_TAG"
          else
            BRANCH=$(printf '%s' "$RAW_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//; s/-+/-/g' | cut -c1-80)
            if [ -z "$BRANCH" ]; then
              BRANCH=ref
            fi
            IMAGE_TAG="${BRANCH}-latest"
            echo "使用分支最新镜像 Tag: $IMAGE_TAG"
          fi
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy-ecs:
    name: 部署到 ECS (Staging)
    needs: resolve-tag
    if: inputs.target == 'ecs' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: 同步部署文件到 ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/buildreach_ecs
          chmod 600 ~/.ssh/buildreach_ecs
          ssh-keyscan -p 22 -H "$ECS_HOST" >> ~/.ssh/known_hosts
          tar -czf - deploy/deploy.sh docker-compose.production.yml | \
            ssh -i ~/.ssh/buildreach_ecs -p 22 "$ECS_USER@$ECS_HOST" \
              'cd /opt/buildreach && tar -xzf - && chmod +x deploy/deploy.sh'

      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        env:
          REF: ${{ github.ref_name }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          envs: REF
          script: |
            cd /opt/buildreach
            DEPLOY_SKIP_CODE_UPDATE=1 \
            DEPLOY_REF="origin/$REF" \
            IMAGE_TAG=${{ needs.resolve-tag.outputs.image_tag }} \
            IMAGE_REGISTRY=${{ env.ACR_IMAGE_REGISTRY }} \
            DEPLOY_API_BASE_URL=http://${{ secrets.ECS_HOST }} \
            DEPLOY_CORS_ORIGINS=http://${{ secrets.ECS_HOST }} \
              bash deploy/deploy.sh

      - name: 部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ ECS 部署成功 (镜像: ${{ needs.resolve-tag.outputs.image_tag }})"
          else
            echo "❌ ECS 部署失败"
          fi

  deploy-ovh:
    name: 部署到 OVH (Production)
    needs: resolve-tag
    # 生产只允许从 release-v* 分支/tag 重部署（即使选了 both，从 main 也不会误推生产）
    if: (inputs.target == 'ovh' || inputs.target == 'both') && startsWith(github.ref_name, 'release-v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        env:
          REF: ${{ github.ref_name }}
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          envs: REF
          script: |
            cd /opt/buildreach
            git fetch origin
            git reset --hard "origin/$REF"
            DEPLOY_REF="origin/$REF" \
            IMAGE_TAG=${{ needs.resolve-tag.outputs.image_tag }} \
            GHCR_TOKEN=${{ secrets.GHCR_TOKEN }} \
            DEPLOY_API_BASE_URL=${{ secrets.OVH_PUBLIC_ORIGIN }} \
            DEPLOY_CORS_ORIGINS=${{ secrets.OVH_PUBLIC_ORIGIN }} \
              bash deploy/deploy.sh

      - name: 部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ OVH 生产部署成功 (镜像: ${{ needs.resolve-tag.outputs.image_tag }})"
          else
            echo "❌ OVH 生产部署失败"
          fi
