name: Build & Deploy

# 手动触发:GitHub 网页 → Actions → "Build & Deploy" → Run workflow
on:
  workflow_dispatch:

# 同分支新触发时取消旧的，不排队等待（仅限构建阶段）
concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REGISTRY: ghcr.io/matgo-dev/buildreach
  ACR_REGISTRY: crpi-mduxqqlcuiv1a644.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE_REGISTRY: crpi-mduxqqlcuiv1a644.cn-hangzhou.personal.cr.aliyuncs.com/buildlink01

jobs:
  # ── 迁移安全检查 ──
  check-migration:
    name: 迁移安全检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查破坏性迁移
        run: |
          if git log -1 --pretty=%B | grep -q '\[allow-destructive-migration\]'; then
            echo "已授权破坏性迁移,跳过检查"
            exit 0
          fi
          bash deploy/check-migration-safety.sh

  # ── 构建镜像并推送到 GHCR + ACR ──
  build:
    name: 构建并推送镜像
    needs: check-migration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: 计算镜像 Tag
        id: meta
        run: |
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${BRANCH}-${SHORT_SHA}"
          LATEST_TAG="${BRANCH}-latest"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "镜像 Tag: $IMAGE_TAG / $LATEST_TAG"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送 backend 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REGISTRY }}/backend:${{ steps.meta.outputs.latest_tag }}
            ${{ env.ACR_IMAGE_REGISTRY }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_IMAGE_REGISTRY }}/backend:${{ steps.meta.outputs.latest_tag }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 frontend 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REGISTRY }}/frontend:${{ steps.meta.outputs.latest_tag }}
            ${{ env.ACR_IMAGE_REGISTRY }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_IMAGE_REGISTRY }}/frontend:${{ steps.meta.outputs.latest_tag }}
          build-args: |
            NEXT_PUBLIC_DEMO_EMAILS=${{ vars.DEMO_EMAILS }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── 部署到 ECS（测试/预发环境，从 ACR 拉取）──
  deploy-ecs:
    name: 部署到 ECS (Staging)
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            cd /opt/buildreach
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            DEPLOY_REF=origin/${{ github.ref_name }} \
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} \
            IMAGE_REGISTRY=${{ env.ACR_IMAGE_REGISTRY }} \
            DEPLOY_API_BASE_URL=http://${{ secrets.ECS_HOST }} \
            DEPLOY_CORS_ORIGINS=http://${{ secrets.ECS_HOST }} \
              bash deploy/deploy.sh

      - name: 部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ ECS 部署成功"
            echo "   镜像: ${{ needs.build.outputs.image_tag }}"
            echo "   地址: http://${{ secrets.ECS_HOST }}"
          else
            echo "❌ ECS 部署失败"
          fi

  # ── 部署到 OVH（生产环境，从 GHCR 拉取）──
  deploy-ovh:
    name: 部署到 OVH (Production)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            cd /opt/buildreach
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            DEPLOY_REF=origin/${{ github.ref_name }} \
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} \
            GHCR_TOKEN=${{ secrets.GHCR_TOKEN }} \
            DEPLOY_API_BASE_URL=${{ secrets.OVH_PUBLIC_ORIGIN }} \
            DEPLOY_CORS_ORIGINS=${{ secrets.OVH_PUBLIC_ORIGIN }} \
              bash deploy/deploy.sh

      - name: 部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ OVH 生产部署成功"
            echo "   镜像: ${{ needs.build.outputs.image_tag }}"
          else
            echo "❌ OVH 生产部署失败"
          fi
