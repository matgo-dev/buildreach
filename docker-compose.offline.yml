name: buildreach

# ============================================================
# BuildReach · 离线部署编排
#
# 与 docker-compose.yml 的区别:
#   - 用 image: 不用 build: — 镜像由打包机预构建，docker load 后直接用
#   - db 不暴露端口，只 expose
#   - restart: unless-stopped
#   - 日志滚动限制
#
# 使用方式:
#   docker compose -f docker-compose.offline.yml --env-file .env.production up -d
#
# 镜像来源: docker load（打包机预构建），不需要 build / pull
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - "5432"
    logging: *default-logging

  backend:
    image: buildlink-backend:${RELEASE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_INITIAL_PASSWORD: ${SUPER_ADMIN_INITIAL_PASSWORD}
      SEED_DEMO_ACCOUNTS: ${SEED_DEMO_ACCOUNTS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH:-/api/v1/auth}
      REFRESH_COOKIE_MAX_AGE: ${REFRESH_COOKIE_MAX_AGE:-604800}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_MAX_FAILURES: ${LOGIN_RATE_LIMIT_MAX_FAILURES:-5}
      LOGIN_RATE_LIMIT_LOCK_SECONDS: ${LOGIN_RATE_LIMIT_LOCK_SECONDS:-300}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_DEBUG_API: ${ENABLE_DEBUG_API:-false}
      IMAGE_PATH_PREFIX: ${IMAGE_PATH_PREFIX:-/static}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-mock}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      ALIYUN_TRANSLATE_ACCESS_KEY_ID: ${ALIYUN_TRANSLATE_ACCESS_KEY_ID:-}
      ALIYUN_TRANSLATE_ACCESS_KEY_SECRET: ${ALIYUN_TRANSLATE_ACCESS_KEY_SECRET:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      WHATSAPP_DEFAULT_NUMBER: ${WHATSAPP_DEFAULT_NUMBER:-+255 758 311 131}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-info@buildreach.co.tz}
      DEMO_EMAILS: ${DEMO_EMAILS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@matgo.co.tz}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      EMAIL_DEV_LOG_CODES: ${EMAIL_DEV_LOG_CODES:-false}
    volumes:
      - uploads:/app/uploads
      - private_uploads:/app/private_uploads
      - ${BANNER_DIR:-./data/banners}:/srv/banners:ro
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_HOST_PORT:-17857}:8000"
    logging: *default-logging

  frontend:
    image: buildlink-frontend:${RELEASE_TAG}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_HOST_PORT:-7857}:3000"
    logging: *default-logging

volumes:
  pgdata:
    name: offline_platform_pgdata
  uploads:
    name: offline_platform_uploads
  private_uploads:
    name: offline_platform_private_uploads
