# ============================================================
# 生产部署编排（镜像拉取模式）
#
# 与 docker-compose.yml 的区别：
#   - backend/frontend 用 image: 从阿里云 ACR 拉取，不走本地 build
#   - ghcr.io 作为备份 registry，ACR 为主（ECS 同区域拉取秒级）
#   - 本地开发仍用 docker-compose.yml 的 build: 方式
#
# 用法：
#   IMAGE_TAG=dev-latest docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# 回退（ghcr.io 不可用时）：
#   docker compose --env-file .env.production up -d --build
# ============================================================

# 共用日志驱动:每服务最多 30MB(10m x 3 文件滚动),防磁盘塞满
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - "5432"
    logging: *default-logging

  backend:
    image: crpi-mduxqqlcuiv1a644.cn-hangzhou.personal.cr.aliyuncs.com/buildlink01/backend:${IMAGE_TAG:-main-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_INITIAL_PASSWORD: ${SUPER_ADMIN_INITIAL_PASSWORD}
      SEED_DEMO_ACCOUNTS: ${SEED_DEMO_ACCOUNTS:-true}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH:-/api/v1/auth}
      REFRESH_COOKIE_MAX_AGE: ${REFRESH_COOKIE_MAX_AGE:-604800}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_MAX_FAILURES: ${LOGIN_RATE_LIMIT_MAX_FAILURES:-5}
      LOGIN_RATE_LIMIT_LOCK_SECONDS: ${LOGIN_RATE_LIMIT_LOCK_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_DEBUG_API: ${ENABLE_DEBUG_API:-false}
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-http://localhost:8000/static}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-mock}
      ALIYUN_TRANSLATE_ACCESS_KEY_ID: ${ALIYUN_TRANSLATE_ACCESS_KEY_ID:-}
      ALIYUN_TRANSLATE_ACCESS_KEY_SECRET: ${ALIYUN_TRANSLATE_ACCESS_KEY_SECRET:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    # 保留 host 端口供调试直连,生产流量走 nginx:80
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8000"
    logging: *default-logging

  frontend:
    image: crpi-mduxqqlcuiv1a644.cn-hangzhou.personal.cr.aliyuncs.com/buildlink01/frontend:${IMAGE_TAG:-main-latest}
    restart: unless-stopped
    depends_on:
      - backend
    # 保留 host 端口供调试直连,生产流量走 nginx:80
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    logging: *default-logging

  nginx:
    image: nginx:1.26-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${BANNER_DIR:-./data/banners}:/srv/banners:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

volumes:
  pgdata:
    name: overseas_platform_pgdata
  uploads:
    name: overseas_platform_uploads
  nginx_cache:
