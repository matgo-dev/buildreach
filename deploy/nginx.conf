# ============================================================
# BuildLink EA — Nginx 反向代理 + 静态缓存
#
# 职责:
#   1. 统一入口,前后端不再各自暴露端口
#   2. 静态资源强缓存(banner/图片),减少后端压力
#   3. API 短缓存(品类树等低频变更接口)
#   4. 为后续 HTTPS 预留位置
# ============================================================

# 代理缓存区:存磁盘,最多 100MB,10 分钟未访问自动淘汰
proxy_cache_path /var/cache/nginx/api_cache
    levels=1:2
    keys_zone=api_cache:10m
    max_size=100m
    inactive=10m;

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ── 通用代理头 ──
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_vary on;

    # ── 安全头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HTTPS 上线后启用 HSTS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 隐藏版本号 ──
    server_tokens off;

    # ── 请求体大小(图片上传) ──
    client_max_body_size 20m;

    # ── 1. Banner 图片:每次验证,支持热更新 ──
    location /banners/ {
        alias /srv/banners/;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # ── 2. 后端静态资源(商品图片等):长缓存（文件名含 uuid，内容不变） ──
    location /static/ {
        proxy_pass http://backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 3. 品类树 API:代理缓存 5 分钟 ──
    location = /api/v1/categories/tree {
        proxy_pass http://backend;
        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        # 缓存按 Origin 区分,避免 CORS 头丢失
        proxy_cache_key "$request_uri$arg_max_depth$http_accept_language$http_origin";
        proxy_cache_bypass $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── 4. 其他 API:直接转发,不缓存 ──
    location /api/ {
        proxy_pass http://backend;
        proxy_read_timeout 120s;
    }

    # ── 5. 健康检查:直接转发 ──
    location = /healthz {
        proxy_pass http://backend;
        access_log off;
    }

    # ── 6. 前端 public 静态图片(mock 商品图/楼层背景等):缓存 30 天 ──
    location /images/ {
        proxy_pass http://frontend;
        proxy_cache api_cache;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 7. Next.js 静态资源:强缓存 ──
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 7. 前端(Next.js SSR):兜底 ──
    location / {
        proxy_pass http://frontend;
    }
}
