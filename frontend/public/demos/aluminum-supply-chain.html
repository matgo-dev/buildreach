                .style("opacity", d => (d.data.isRoot && !d.children) ? 1 : 0);

            nodeUpdate.select("rect").transition().duration(600)

            event.stopPropagation(); hideContextMenu();
            
            if (d.data.isRoot) {
                if (!d.children) { d.children = d._children; d._children = null; if (d.children) d.children.forEach(collapseAll); } 
                else {
                    let hasDeepNodes = false;
                    d.children.forEach(child => { if (child.children && child.children.length > 0) hasDeepNodes = true; });
                    if (hasDeepNodes) d.children.forEach(collapseAll); else collapseAll(d); 
                }
                update(d); centerOnNode(root, 1.1, true); 
            } else {
                if (d.children || d._children) {
                    d.children = d.children ? (d._children = d.children, null) : d._children;
                    update(d); centerOnNode(d); 
                }
            }

            // 叶子节点展示详细数据浮层
            if (d.data.refId) {
                if (d.data.type === 'supplier') showSupplierPanel(d.data.refId);
                else if (d.data.type === 'project') showProjectPanel(d.data.refId);
            }
        }

        function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
        function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 1 / 1.3); }
        function fitWindow() {
            const bounds = svgGroup.node().getBBox();
            if (bounds.width === 0 || bounds.height === 0) return;
            const dx = bounds.width, dy = bounds.height, x = bounds.x + dx / 2, y = bounds.y + dy / 2;
            const scale = Math.max(0.2, Math.min(1.5, 0.9 / Math.max(dx / width, dy / height)));
            const translate = [width / 2 - scale * x, height / 2 - scale * y];
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
        }

        // 5.6 终极杀手锏：AI 智能供方推荐与反倾销自动避让算法
        function showSupplierAnalysis(projectRefId) {
            hideContextMenu();
            const proj = PROJECTS[projectRefId];
            if (!proj) return;

            document.getElementById("panel-title").innerHTML = "💡 业务编排层：AI 供方智能匹配";
            
            // 核心算法：融合履约分、地缘关税、制裁红线、体量门槛
            let matchedSuppliers = Object.entries(SUPPLIERS).map(([key, sup]) => {
                let matchScore = sup.score; // 基础分为平台主线三评分
                let reasons = [];

                // 规则 1. 俄罗斯制裁一票否决
                if (sup.risk && sup.risk.includes('制裁')) {
                    matchScore -= 50; 
                    reasons.push("🔴 高危预警：存在LME或欧盟制裁，合规断单风险极大！");
                }

                // 规则 2. 中东GCC互免关税与对华反倾销博弈
                if (proj.region === 'c-sa' || proj.region === 'c-ae') {
                    if (sup.region === 'sr-me') {
                        matchScore += 18;
                        reasons.push("🟢 关税特权：同属中东GCC区域，零关税内部流通。");
                    } else if (sup.country === '中国') {
                        matchScore -= 8;
                        reasons.push("🟠 成本警示：需核算对华合金铝卷(7606.12)的 7.1-20% 附加反倾销税。");

                }

                else if (proj.region === 'c-vn' || proj.region === 'c-id' || proj.region === 'c-th') {
                    if (sup.region === 'sr-sea') {
                        matchScore += 12;
                        reasons.push("🟢 本地红利：享有东盟内部极低物流成本及免税优势。");
                    } else if (sup.country === '中国') {
                        matchScore += 5;
                        reasons.push("🟢 自贸红利：适用 ACFTA (FORM E) 降税红利。");
                    }
                }

                // 规则 3. 产品场景对口 (幕墙/屋面)
                if ((proj.goods.includes('幕墙') || proj.type === '公共建筑') && (sup.advantage.includes('幕墙') || sup.scope.includes('幕墙'))) {
                    matchScore += 10;

                    reasons.push(`🛡️ 交付兜底：巨型产能 (${sup.capacityStr}) 完美支撑千吨级大盘交付。`);
                }

                matchScore = Math.max(0, Math.min(99, matchScore));
                return { ...sup, refId: key, matchScore, reasons };
            });

            // 高到低排序
            matchedSuppliers.sort((a, b) => b.matchScore - a.matchScore);

            let html = `

            // 仅展示最佳的Top 3候选

                html += `
                <div class="rank-card" style="cursor:pointer;" onclick="showSupplierPanel('${sup.refId}')" title="点击下钻该厂档案">
                    <div class="rank-header">
                        <span style="font-size: 15px;">#${idx+1} ${sup.name}</span>
                        <span class="badge ${scoreColor}" style="font-size:13px;">匹配推荐度: ${sup.matchScore}%</span>
                    </div>
                    <div class="rank-body" style="margin-bottom: 12px; border-bottom:1px dashed #E2E8F0; padding-bottom:8px;">
                        <strong>📍 属地：</strong>${sup.country} | <strong>🏭 产能：</strong>${sup.capacityStr} <br> 
                        <strong>✨ 主营：</strong>${sup.scope}
                    </div>
                    <div style="color: #1F2937; font-size: 12px;">
                        <strong>🧠 编排引擎入选解析：</strong>
                        <ul style="margin: 6px 0 0 0; padding-left: 18px; color:#475569;">
                            ${reasonHtml}
                        </ul>
                    </div>
                </div>`;
            });
            document.getElementById("panel-content").innerHTML = html;
            document.getElementById("info-panel").classList.add("show");
        }

        window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; svg.attr("width", width).attr("height", height); });
    </script>
</body>
</html>
