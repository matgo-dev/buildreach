<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- plank-m / cw-obsidian-emerald: graphite monochrome strata; the single emerald signal plank is the only chroma in the mark -->
  <!-- row 1: left shoulder + ghost slot + arriving plank -->
  <rect x="36" y="42" width="68" height="28" rx="6" fill="#454c59"/>
  <rect x="152" y="42" width="68" height="28" rx="6" fill="#10b981" opacity="0.15"/>
  <rect x="164" y="28" width="68" height="28" rx="6" fill="#10b981"/>
  <!-- row 2: shoulders step inward -->
  <rect x="36" y="78" width="86" height="28" rx="6" fill="#383e4a"/>
  <rect x="134" y="78" width="86" height="28" rx="6" fill="#383e4a"/>
  <!-- row 3: the fused layer -->
  <rect x="36" y="114" width="184" height="28" rx="6" fill="#2b303b"/>
  <!-- row 4: stems + descending apex -->
  <rect x="36" y="150" width="48" height="28" rx="6" fill="#20242e"/>
  <rect x="106" y="150" width="44" height="28" rx="6" fill="#20242e"/>
  <rect x="172" y="150" width="48" height="28" rx="6" fill="#20242e"/>
  <!-- row 5: feet + apex tip -->
  <rect x="36" y="186" width="48" height="28" rx="6" fill="#15181f"/>
  <rect x="118" y="186" width="20" height="28" rx="6" fill="#15181f"/>
  <rect x="172" y="186" width="48" height="28" rx="6" fill="#15181f"/>
</svg>
